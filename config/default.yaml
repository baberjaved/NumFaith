# NumFaith default configuration.
# Placeholder values; filled in by later phases (dataset choice in Phase 3,
# detector wiring in Phase 6). Override by copying and pointing the scripts at
# a different YAML.

paths:
  raw_dir: data/raw                              # downloaded source QA (gitignored)
  processed_dir: data/processed
  trios: data/processed/trios.jsonl              # faithful (source, question, answer) trios
  testset: data/processed/numfaith_testset.jsonl # faithful + perturbed test set
  results_dir: results
  tables_dir: results/tables
  figures_dir: results/figures

# Source dataset to load and normalise.
source_dataset: financebench   # one of: financebench | finqa | tatqa | convfinqa
max_examples: 800              # cap on faithful trios kept (FinanceBench has 150)

# Per-source loading settings.
source:
  financebench:
    hf_path: PatronusAI/financebench   # CC-BY-NC-4.0; loaded from HF, not redistributed
    hf_split: train

# Answer-breaking engine (Phase 4).
perturbations:
  seed: 42
  enabled:
    - number_swap
    - date_shift
    - unit_currency
    - direction_flip
    - entity_swap
  # Threshold separating a "subtle" numeric change from a "gross" one,
  # as a relative fraction of the original value.
  subtle_gross_threshold: 0.10

# Faithfulness detectors to run. (RAGAS dropped — API-volatile and duplicates the
# LLM-judge's LLM-based signal.)
detectors:
  enabled:
    - lettucedetect
    - nli
    - llm_judge
  lettucedetect:
    model_path: KRLabsOrg/lettucedect-base-modernbert-en-v1
  nli:
    model: MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli
    threshold: 0.5            # P(entailment) below this -> unfaithful
  # LLM judge reads its API key from an environment variable, never committed.
  llm_judge:
    model: gpt-4.1-mini
    api_key_env: OPENAI_API_KEY
